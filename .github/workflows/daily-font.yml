name: Daily font expansion

on:
  schedule:
    - cron: "30 2 * * *"   # 台北 10:30 主跑
    - cron: "30 5 * * *"   # 台北 13:30 補跑(主跑被 GitHub 跳過時遞補)
    - cron: "30 8 * * *"   # 台北 16:30 補跑(當日已成功則腳本自動 skip)
  workflow_dispatch:

concurrency:
  group: daily-font
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  add-font:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pillow

      - name: Generate and verify today's font
        id: gen
        env:
          CODEX_IMAGE_BASE_URL: ${{ secrets.CODEX_IMAGE_BASE_URL }}
          CODEX_IMAGE_KEY: ${{ secrets.CODEX_IMAGE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tools/daily_font.py

      - name: Commit and push
        if: steps.gen.outputs.added == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonts.json queue.json samples/
          git commit -m "每日擴充:#${{ steps.gen.outputs.font_no }} ${{ steps.gen.outputs.font_name }}"
          git push

      - name: Low queue notice
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(python -c "import json; print(len(json.load(open('queue.json'))['queue']))")
          echo "queue 剩 $count 筆"
          if [ "$count" -lt 14 ] && [ -z "$(gh issue list --state open --search '補候選 in:title' --json number --jq '.[0].number')" ]; then
            gh issue create \
              --title "候選佇列剩 $count 筆,該補候選了" \
              --body "queue.json 低於 14 筆水位。批次補約 20 個新候選(跟 fonts.json 全表+queue 現有項查重、看分類缺口),走 PR 人工掃過再合。處理完關掉此 issue。"
          fi
